# Start & Help
welcome: |
  Welcome to F1 Bot!

  Use commands to get race results, standings, and more.
  Tap the button below to open the full F1 App.

help: |
  Available commands:

  /race [year] [round] — Race results
  /qualifying [year] [round] — Qualifying results
  /sprint [year] [round] — Sprint results
  /wdc [year] — Drivers championship
  /wcc [year] — Constructors championship
  /calendar [year] — Season calendar
  /next — Next race info
  /driver CODE — Driver profile (e.g. /driver VER)
  /speed year round DR1 [DR2] — Speed trace
  /laps year round DR1 [DR2] — Lap comparison
  /strategy [year] [round] — Tire strategy
  /lang en|ru — Change language
  /app — Open F1 WebApp

