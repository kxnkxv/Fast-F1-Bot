# Start & Help
welcome: |
  Добро пожаловать в F1 Bot!

  Используйте команды для просмотра результатов гонок, турнирных таблиц и многого другого.
  Нажмите кнопку ниже, чтобы открыть F1 App.

help: |
  Доступные команды:

  /race [год] [раунд] — Результаты гонки
  /qualifying [год] [раунд] — Результаты квалификации
  /sprint [год] [раунд] — Результаты спринта
  /wdc [год] — Чемпионат пилотов
  /wcc [год] — Кубок конструкторов
  /calendar [год] — Календарь сезона
  /next — Следующая гонка
  /driver КОД — Профиль пилота (напр. /driver VER)
  /speed год раунд ДР1 [ДР2] — Скоростная трасса
  /laps год раунд ДР1 [ДР2] — Сравнение кругов
  /strategy [год] [раунд] — Стратегия шин
  /lang en|ru — Сменить язык
  /app — Открыть F1 WebApp

